name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm test
      - run: npm run test:react:release
      - run: |
          echo "validate examples"
          for f in examples/*.json; do
            echo "  - $f"
            node -e "
              import('./packages/wire-core/dist/index.js').then(m => {
                const d = m.parseWireDiagram(JSON.parse(require('fs').readFileSync('$f','utf8')));
                const r = m.validate(d);
                if (!r.valid) { console.error(r.issues); process.exit(1); }
              });
            "
          done
