name: Release

on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
          scope: "@aigentive"

      - name: Resolve release tag
        id: release
        run: |
          package_version="$(node -p "require('./package.json').version")"
          release_tag="v${package_version}"
          should_release=true

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            if [ "$GITHUB_REF_NAME" != "$release_tag" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match package version ${release_tag}."
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git fetch --tags --force
            current_sha="$(git rev-parse HEAD)"
            if git rev-parse "$release_tag" >/dev/null 2>&1; then
              tagged_sha="$(git rev-list -n 1 "$release_tag")"
              if [ "$tagged_sha" != "$current_sha" ]; then
                echo "::notice::${release_tag} already points to ${tagged_sha}; skipping release for post-tag commit ${current_sha}. Bump package.json version before the next release."
                should_release=false
              else
                echo "${release_tag} already points at ${current_sha}."
              fi
            else
              git tag "$release_tag" "$current_sha"
              git push origin "refs/tags/${release_tag}"
            fi
          fi

          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

      - if: steps.release.outputs.should_release == 'true'
        run: npm ci
      - if: steps.release.outputs.should_release == 'true'
        run: npm run build
      - if: steps.release.outputs.should_release == 'true'
        run: npm test

      - name: Pack workspace packages
        if: steps.release.outputs.should_release == 'true'
        run: |
          mkdir -p dist-packages
          for pkg in packages/wire-core packages/wire-renderers packages/wire-react packages/wire-mcp packages/wire-cli; do
            npm pack "./$pkg" --pack-destination dist-packages
          done

      - name: Publish to npm
        if: steps.release.outputs.should_release == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi

          for pkg in packages/wire-core packages/wire-renderers packages/wire-react packages/wire-mcp packages/wire-cli; do
            name="$(node -p "require('./$pkg/package.json').name")"
            version="$(node -p "require('./$pkg/package.json').version")"
            if npm view "${name}@${version}" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
              echo "Skipping ${name}@${version}; already published."
              continue
            fi
            npm publish "./$pkg" --registry=https://registry.npmjs.org/ --access public --provenance
          done

      - name: Create GitHub release
        if: steps.release.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_tag="${{ steps.release.outputs.tag }}"
          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release edit "$release_tag" \
              --title "Wire ${release_tag}" \
              --notes "Wire ${release_tag} release."
            gh release upload "$release_tag" dist-packages/*.tgz --clobber
          else
            gh release create "$release_tag" dist-packages/*.tgz \
              --title "Wire ${release_tag}" \
              --notes "Wire ${release_tag} release." \
              --verify-tag
          fi
